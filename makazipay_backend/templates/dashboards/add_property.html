{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white shadow-md rounded-lg p-8 mt-10">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">
        {% if property %}Edit Property{% else %}Add Property{% endif %}
    </h1>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} mb-4">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% if property %}{% url 'edit_property' property.id %}{% else %}{% url 'add_property' %}{% endif %}" class="space-y-4">
        {% csrf_token %}

        <div>
            <label for="name" class="block text-gray-700 font-medium">Property Name</label>
            <input type="text" id="name" name="name" required
                   value="{{ property.name|default_if_none:'' }}"
                   class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label for="address" class="block text-gray-700 font-medium">Address</label>
            <input type="text" id="address" name="address" required
                   value="{{ property.address|default_if_none:'' }}"
                   class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label for="total_units" class="block text-gray-700 font-medium">Total Units</label>
            <input type="number" id="total_units" name="total_units" min="1" required
                   value="{{ property.total_units|default_if_none:'' }}"
                   class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="flex gap-4">
            <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition duration-200 flex-1">
                {% if property %}Update Property{% else %}Add Property{% endif %}
            </button>
            <a href="{% url 'landlord_dashboard' %}"
               class="bg-gray-400 text-white px-6 py-2 rounded hover:bg-gray-500 transition duration-200 flex-1 text-center">
                Cancel
            </a>
        </div>
    </form>

    {% if property %}
        <form method="POST" action="{% url 'delete_property' property.id %}" class="mt-4">
            {% csrf_token %}
            <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700 transition duration-200">
                Delete Property
            </button>
        </form>
    {% endif %}
</div>
{% endblock %}
