{% extends "base.html" %}

{% block title %}Contact - MakaziPAY Kenya{% endblock %}

{% block content %}
<section class="contact-section">
    <div class="container">
        <h1>Contact Us</h1>
        <p>If you have questions or need support, we’re here to help.</p>
        <div class="contact-grid">
            <div class="contact-card">
                <i class="fas fa-envelope"></i>
                <h3>Email</h3>
                <p>info@makazipaykenya.com</p>
            </div>
            <div class="contact-card">
                <i class="fas fa-phone"></i>
                <h3>Phone</h3>
                <p>+254 714 300 672</p>
            </div>
            <div class="contact-card">
                <i class="fas fa-map-marker-alt"></i>
                <h3>Office</h3>
                <p>Nairobi, Kenya</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
